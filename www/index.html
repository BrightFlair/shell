<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="utf-8" />
        <!--
        Customize this policy to fit your own app's needs. For more guidance, please refer to the docs:
            https://cordova.apache.org/docs/en/latest/
        Some notes:
            * https://ssl.gstatic.com is required only on Android and is needed for TalkBack to function properly
            * Disables use of inline scripts in order to mitigate risk of XSS vulnerabilities. To change this:
                * Enable inline JS: add 'unsafe-inline' to default-src
        -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: http://localhost:8080 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no" />
        <meta name="msapplication-tap-highlight" content="no" />
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover" />
        <meta name="color-scheme" content="light dark" />
        <link rel="stylesheet" href="css/style.css" />
        <title>Shell</title>
    </head>
    <body>
        <!-- <iframe src="https://pwa.g105b.com?shell"></iframe> -->
        <iframe id="mainpage" src="http://localhost:8080"></iframe>
        <form>
            <button type="button" id="debug1">Debug 1</button>
            <button type="button" id="debug2">Debug 2</button>
            <button type="button" id="debug3">Debug 3</button>
        </form>
        <!--suppress HtmlUnknownTarget -->
        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
